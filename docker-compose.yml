services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URL: mongodb://mongo:27017/tinytools
      JWT_SECRET: dev-secret-change-in-prod
      ADMIN_EMAIL: admin@tiny-tools.dev
      ADMIN_PASSWORD: admin123
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongo

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_SITE_URL: http://localhost:3000
      NUXT_PUBLIC_API_URL: http://api:3001
      NUXT_PUBLIC_ADSENSE_ID: ""

volumes:
  mongo-data:
